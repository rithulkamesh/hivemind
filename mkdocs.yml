# Hivemind docs — https://hivemind.rithul.dev
# Build: mkdocs build | Deploy: mike deploy --push <version> latest

site_name: Hivemind
site_description: Distributed AI Swarm Runtime
site_url: https://hivemind.rithul.dev
repo_url: https://github.com/rithulkamesh/hivemind
repo_name: rithulkamesh/hivemind
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: emerald
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: emerald
      accent: amber
      background: "#0F172A"
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  logo: branding/logo.svg
  favicon: branding/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mike:
      deploy_prefix: ""
      version_selector: true
      alias_type: redirect
      canonical_version: latest

nav:
  - Home: index.md
  - Introduction: introduction.md
  - Getting started:
    - Configuration: configuration.md
    - CLI: cli.md
    - Examples: examples.md
  - Concepts:
    - Architecture: architecture.md
    - Swarm runtime: swarm_runtime.md
    - Memory system: memory_system.md
    - Tools: tools.md
    - Providers: providers.md
  - TUI: tui.md
  - Development: development.md
  - Release checklist: release_checklist.md
  - FAQ: faq.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
