# Controller node for distributed mode (v1.10).
# Use with: uv run python examples/distributed/run_controller.py "Your task"
# Requires: Redis running (docker compose up -d), workers started first.

[nodes]
mode = "distributed"
role = "controller"
run_id = "distributed-demo"
rpc_port = 7700
deregister_stale_workers = false
# If a worker doesn't claim within this many seconds, task is re-queued for another worker (LLM can be slow).
task_claim_timeout_seconds = 180

[bus]
backend = "redis"
redis_url = "redis://localhost:6379"

[swarm]
workers = 4
# v1.6+: semantic cache, complexity routing
cache_enabled = false
# v1.7: critic, prefetch
prefetch_enabled = true
# v1.9: checkpoint
checkpoint_enabled = true
checkpoint_interval = 5

# GitHub provider: set GITHUB_TOKEN in env or use hivemind credentials set github token
[models]
planner = "github:gpt-4o"
worker = "github:gpt-4o"
