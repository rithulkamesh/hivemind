# Air config for hot reload (dev); use poll = true when running in Docker
root = "."
tmp_dir = "tmp"
poll = true

[build]
  cmd = "go build -o ./tmp/main ./cmd/registry"
  bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "vendor", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = false
  delay = 1000

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false

[misc]
  clean_on_exit = true
