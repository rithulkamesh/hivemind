server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy API to backend so same-origin requests work without CORS
    # Uncomment and set proxy_pass to your API URL if serving frontend and API under one domain.
    # location /api/ {
    #     proxy_pass http://api:8080/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    # location /auth/ {
    #     proxy_pass http://api:8080/auth/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
    # location /simple/ {
    #     proxy_pass http://api:8080/simple/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
