# Production deploy on EC2: Caddy + API + Postgres.
# Web static files are in volume web_dist (populated by GitHub Actions rsync).
# API image tag set by deploy workflow; env from /opt/hivemind-registry/.env

version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - web_dist:/srv/web:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-ghcr.io/rithulkamesh/hivemind-registry-api:latest}
    env_file: /opt/hivemind-registry/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hivemind_registry
      POSTGRES_USER: hivemind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemind"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=50
      -c wal_level=minimal
      -c max_wal_senders=0

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  web_dist:
