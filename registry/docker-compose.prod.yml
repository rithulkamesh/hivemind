services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-registry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-registry}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-registry} -d ${POSTGRES_DB:-registry}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - registry-net

  api:
    image: ${ECR_REGISTRY}/registry-api:latest
    restart: always
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-registry}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-registry}?sslmode=disable
      - BASE_URL=${BASE_URL:-https://registry.hivemind.rithul.dev}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - PORT=8080
      - BUCKET_NAME=${BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
      # ECR push permissions logic happens via IAM instance profile or env vars
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - registry-net

  web:
    image: ${ECR_REGISTRY}/registry-web:latest
    restart: always
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-registry}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-registry}?sslmode=disable
      - BETTER_AUTH_URL=${BASE_URL:-https://registry.hivemind.rithul.dev}/auth
      - FRONTEND_URL=${BASE_URL:-https://registry.hivemind.rithul.dev}
      - VITE_API_BASE_URL=${BASE_URL:-https://registry.hivemind.rithul.dev}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - registry-net

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-registry.hivemind.rithul.dev}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /opt/hivemind-docs:/srv/docs:ro
    depends_on:
      - api
      - web
    networks:
      - registry-net

volumes:
  postgres-data:
  caddy_data:
  caddy_config:

networks:
  registry-net:
