# Dev stack: Postgres, API, Web (Vite + Better Auth in same process).
# From registry/: docker compose -f docker-compose.dev.yml up  (or: just dev-docker)
# With just: cd registry && just dev  runs API+web on host with .env loaded.
# API: http://localhost:8080  Web: http://localhost:3000 (serves app + /auth)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
      POSTGRES_DB: hivemind_registry
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d hivemind_registry"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"  # Web UI

  api:
    build:
      context: api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://registry:registry@postgres:5432/hivemind_registry?sslmode=disable
      JWKS_URL: http://web:3000/auth/jwks
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      PORT: "8080"
      BASE_URL: http://localhost:8080
      RATE_LIMIT_RPS: "100"
      MAX_UPLOAD_SIZE_MB: "100"
      VERIFICATION_WORKERS: "2"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@registry.local
    volumes:
      - ./api:/app
      - api-tmp:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 15s

  web:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://registry:registry@postgres:5432/hivemind_registry?sslmode=disable
      GO_API_INTERNAL_URL: http://api:8080
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      FRONTEND_URL: http://localhost:3000
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      VITE_PROXY_TARGET: http://api:8080
      VITE_API_BASE_URL: ""
      VITE_REGISTRY_URL: http://localhost:3000/simple/
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - ./web:/app
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-tmp:
