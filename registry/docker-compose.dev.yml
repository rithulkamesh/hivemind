# Dev stack: Postgres, API (hot reload with Air), Web (Vite dev server).
# From repo root: docker compose -f registry/docker-compose.dev.yml up
# API: http://localhost:8080  Web: http://localhost:5173 (proxies /api, /auth, /simple to API)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
      POSTGRES_DB: hivemind_registry
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d hivemind_registry"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://registry:registry@postgres:5432/hivemind_registry?sslmode=disable
      JWT_SECRET: dev-secret-change-in-prod-min-32-bytes
      PORT: "8080"
      RATE_LIMIT_RPS: "100"
      MAX_UPLOAD_SIZE_MB: "100"
      VERIFICATION_WORKERS: "2"
    volumes:
      - ./api:/app
      - api-tmp:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 15s

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npx vite --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://api:8080
      VITE_API_BASE_URL: ""
      VITE_REGISTRY_URL: http://localhost:5173/simple/
    volumes:
      - ./web:/app
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-tmp:
