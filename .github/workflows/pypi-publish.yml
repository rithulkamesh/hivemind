# Publish hivemind-ai to PyPI when a GitHub release is published.
# Setup: Configure a Trusted Publisher on PyPI for this repo (no API token needed).
# See: https://docs.pypi.org/trusted-publishers/adding-a-published-publisher/

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publishing: add this repo as a Trusted Publisher on PyPI;
        # no secrets needed. To use an API token instead, add repository
        # secrets PYPI_API_TOKEN and set:
        # env:
        #   TWINE_USERNAME: __token__
        #   TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
