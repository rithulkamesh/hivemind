# Deploy docs to GitHub Pages (hivemind.rithul.dev)
# - On push to main: build Docusaurus and deploy to gh-pages
# - On release published: add docs version for the release, commit to main, then deploy runs via push
#
# Required: Repo Settings → Pages → Build and deployment → Source:
#   "Deploy from a branch" → Branch: gh-pages → / (root)

name: Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "website/**"
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  add-version:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Parse version from tag
        id: version
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Install and add docs version
        run: |
          cd website
          npm ci
          npx docusaurus docs:version ${{ steps.version.outputs.version }}

      - name: Commit versioned docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/versioned_docs website/versioned_sidebars website/versions.json
          git diff --staged --quiet || (git commit -m "chore(docs): add version ${{ steps.version.outputs.version }}" && git push)

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install and build
        run: |
          cd website
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/build
          cname: hivemind.rithul.dev
