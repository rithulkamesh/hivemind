# Docs versioning: on release, create a versioned docs snapshot and open a PR.
# Actual deployment is handled by docs-deploy.yml (pushes to EC2).
#
# On release published: creates versioned docs via docusaurus docs:version,
# then opens a PR to merge the versioned snapshot into main.

name: Docs Version

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-version
  cancel-in-progress: false

jobs:
  add-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Parse version from tag
        id: version
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Install and add docs version
        run: |
          cd website
          npm ci
          npx docusaurus docs:version ${{ steps.version.outputs.version }}

      - name: Open PR for versioned docs (no push to main)
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "docs/version-${{ steps.version.outputs.version }}"
          base: main
          title: "chore(docs): add version ${{ steps.version.outputs.version }}"
          body: |
            Versioned docs for **v${{ steps.version.outputs.version }}**. Merge to update the docs site.
            This workflow never pushes to main, so your branch will not diverge.
          commit-message: "chore(docs): add version ${{ steps.version.outputs.version }}"
          add-paths: |
            website/versioned_docs
            website/versioned_sidebars
            website/versions.json
          delete-branch: true
