# When you push a version tag (e.g. v1.6.0), create a GitHub Release, push versioned docs to main, and publish to PyPI.
# Note: Creating a release with GITHUB_TOKEN does NOT trigger other workflows, so we run versioned-docs and PyPI here.
#
# Usage:
#   git tag v1.6.0
#   git push origin v1.6.0
#
# PyPI: Add a Trusted Publisher on PyPI with workflow filename release-on-tag.yml (job: pypi-publish).

name: Release on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Tag: v$V"

      - name: Extract changelog section
        run: |
          V="${{ steps.version.outputs.version }}"
          awk -v ver="$V" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          [ -s release_notes.md ] || echo "See CHANGELOG.md for details." > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-version-docs:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Get version from tag
        id: version
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Install and add docs version
        run: |
          cd website
          npm ci
          npx docusaurus docs:version ${{ steps.version.outputs.version }}

      - name: Push versioned docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/versioned_docs website/versioned_sidebars website/versions.json
          git diff --staged --quiet || git commit -m "chore(docs): add version ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

  pypi-publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
