# Registry API: test, build multi-arch image, push to ECR, deploy to EC2.
# Path filter: only registry/api and this workflow.

name: Registry API

on:
  push:
    branches: [main]
    paths:
      - "registry/api/**"
      - ".github/workflows/registry-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "registry/api/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - "5432:5432"
        options: --health-cmd "pg_isready -U test" --health-interval 5s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: registry/api/go.sum
      - run: cd registry/api && go test ./... -race -coverprofile=coverage.out
      - run: cd registry/api && go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: registry/api

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/hivemind-registry-deploy
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: registry/api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/hivemind-registry-api:latest
            ${{ steps.ecr-login.outputs.registry }}/hivemind-registry-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/hivemind-registry-deploy
          aws-region: us-east-1
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.REGISTRY_EC2_HOST }}
          DEPLOY_KEY: ${{ secrets.REGISTRY_DEPLOY_KEY }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ec2-user@$EC2_HOST \
            "cd /opt/hivemind-registry && \
             aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY && \
             export API_IMAGE=$ECR_REGISTRY/hivemind-registry-api:$IMAGE_TAG && \
             docker compose pull api && \
             docker compose up -d --no-deps api && \
             docker image prune -f"
